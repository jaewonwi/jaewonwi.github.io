<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="백엔드 개발자 위재원 프로젝트">
  <title>Projects | 위재원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Jaewon Wi</a>
    <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="site-nav" aria-label="주요 메뉴">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="education.html">Education</a>
      <a href="skills.html">Skills</a>
      <a class="active" href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="page shell">
    <section class="page-title">
      <p class="section-kicker">Projects</p>
      <h1>프로젝트 경험과 문제해결 과정을 함께 보여줍니다.</h1>
      <p>카드를 클릭하면 개요, 기술, 구현 내용, ERD, 아키텍처, 문제해결, 회고를 확인할 수 있습니다.</p>
    </section>

    <section class="project-grid" aria-label="프로젝트 목록">
      <button class="project-card" type="button" data-project="reservation">
        <span class="project-period">2025</span>
        <h2>예약 관리 API</h2>
        <p>예약 생성, 변경, 취소와 관리자 조회를 지원하는 백엔드 API입니다.</p>
        <ul class="tag-list">
          <li>Spring Boot</li>
          <li>JPA</li>
          <li>MySQL</li>
        </ul>
        <strong>N+1 쿼리 개선으로 목록 조회 병목을 줄였습니다.</strong>
      </button>

      <button class="project-card" type="button" data-project="notification">
        <span class="project-period">2025</span>
        <h2>실시간 알림 서버</h2>
        <p>사용자 이벤트 기반 알림 저장과 전달 흐름을 구성한 서버입니다.</p>
        <ul class="tag-list">
          <li>Spring Boot</li>
          <li>Redis</li>
          <li>SSE</li>
        </ul>
        <strong>연결 끊김 상황에서도 읽지 않은 알림을 복구하도록 개선했습니다.</strong>
      </button>

      <button class="project-card" type="button" data-project="learning">
        <span class="project-period">2024</span>
        <h2>학습 관리 플랫폼</h2>
        <p>강의, 과제, 수강 현황을 관리하는 교육 서비스 백엔드입니다.</p>
        <ul class="tag-list">
          <li>QueryDSL</li>
          <li>Docker</li>
          <li>Actions</li>
        </ul>
        <strong>반복 배포 과정을 자동화해 운영 실수를 줄였습니다.</strong>
      </button>
    </section>
  </main>

  <div class="modal" id="project-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-dialog">
      <header class="modal-header">
        <div>
          <p class="section-kicker" id="modal-period">Project</p>
          <h2 id="modal-title">프로젝트 상세</h2>
        </div>
        <button class="close-button" type="button" data-close-modal aria-label="모달 닫기">×</button>
      </header>

      <nav class="modal-tabs" aria-label="프로젝트 상세 탭">
        <button type="button" class="active" data-tab="overview">개요</button>
        <button type="button" data-tab="tech">기술</button>
        <button type="button" data-tab="implementation">구현</button>
        <button type="button" data-tab="erd">ERD</button>
        <button type="button" data-tab="architecture">아키텍처</button>
        <button type="button" data-tab="problem">문제해결</button>
        <button type="button" data-tab="retrospective">회고</button>
      </nav>

      <div class="modal-body">
        <section class="tab-panel active" id="tab-overview" tabindex="0"></section>
        <section class="tab-panel" id="tab-tech" tabindex="0"></section>
        <section class="tab-panel" id="tab-implementation" tabindex="0"></section>
        <section class="tab-panel" id="tab-erd" tabindex="0"></section>
        <section class="tab-panel" id="tab-architecture" tabindex="0"></section>
        <section class="tab-panel" id="tab-problem" tabindex="0"></section>
        <section class="tab-panel" id="tab-retrospective" tabindex="0"></section>
      </div>
    </article>
  </div>

  <footer class="site-footer">
    <span>© 2026 Jaewon Wi</span>
    <a href="mailto:your-email@example.com">your-email@example.com</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
